<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interbank Web MVP</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    body {
      font-family: Segoe UI, Tahoma, sans-serif;
      margin: 20px;
      background: #f7f7f7;
      color: #1f2937;
    }
    .panel {
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 16px;
      max-width: 900px;
    }
    .row {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    label {
      font-size: 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    input {
      width: 110px;
      padding: 6px;
      border: 1px solid #9ca3af;
      border-radius: 4px;
    }
    button {
      padding: 8px 14px;
      background: #2563eb;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    #status {
      margin-top: 10px;
      font-size: 14px;
    }
    pre {
      background: #0f172a;
      color: #d1d5db;
      border-radius: 6px;
      padding: 10px;
      overflow: auto;
      max-height: 420px;
      margin-top: 14px;
    }
    .plot-box {
      width: 100%;
      min-height: 320px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      margin-top: 14px;
      background: #ffffff;
    }
    .table-wrap {
      margin-top: 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      overflow: auto;
      max-height: 360px;
      background: #ffffff;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    th, td {
      border: 1px solid #e5e7eb;
      padding: 4px 6px;
      text-align: right;
      white-space: nowrap;
    }
    th {
      background: #f3f4f6;
      position: sticky;
      top: 0;
      z-index: 1;
      text-align: center;
    }
    .table-note {
      margin-top: 6px;
      font-size: 11px;
      color: #6b7280;
    }
    .table-toolbar {
      margin-top: 8px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .table-toolbar button {
      background: #374151;
      padding: 6px 10px;
      font-size: 12px;
    }
    .table-toolbar span {
      font-size: 12px;
      color: #374151;
    }
  </style>
</head>
<body>
  <div class="panel">
    <h1>Interbank Web MVP (simulate)</h1>
    <div class="row">
      <label>N
        <input id="N" type="number" value="50" min="2" step="1">
      </label>
      <label>T
        <input id="T" type="number" value="300" min="1" step="1">
      </label>
      <label>seed
        <input id="seed" type="number" value="5" min="0" step="1">
      </label>
      <label>p
        <input id="p" type="number" value="0.8" min="0" max="1" step="0.01">
      </label>
    </div>
    <button id="run">Run simulation</button>
    <div id="status"></div>
    <div id="chart" class="plot-box"></div>
    <div id="table" class="table-wrap"></div>
    <div class="table-toolbar">
      <button id="table-prev" type="button">Prev 200</button>
      <button id="table-next" type="button">Next 200</button>
      <span id="table-page"></span>
      <button id="table-export" type="button">Export CSV</button>
    </div>
    <div id="table-note" class="table-note"></div>
    <pre id="output">{}</pre>
  </div>

  <script>
    (function () {
      const runButton = document.getElementById("run");
      const status = document.getElementById("status");
      const output = document.getElementById("output");
      const chart = document.getElementById("chart");
      const table = document.getElementById("table");
      const tableNote = document.getElementById("table-note");
      const tablePage = document.getElementById("table-page");
      const tablePrev = document.getElementById("table-prev");
      const tableNext = document.getElementById("table-next");
      const tableExport = document.getElementById("table-export");
      const tableState = { headers: [], rows: [], page: 0, pageSize: 200, filename: "simulate" };

      function csvCell(value) {
        const text = value === null || value === undefined ? "" : String(value);
        if (text.indexOf('"') >= 0 || text.indexOf(',') >= 0 || text.indexOf('\n') >= 0) {
          return '"' + text.replace(/"/g, '""') + '"';
        }
        return text;
      }

      function exportTableCsv() {
        if (!tableState.headers.length) {
          return;
        }
        const lines = [];
        lines.push(tableState.headers.map(csvCell).join(","));
        tableState.rows.forEach((row) => {
          lines.push(row.map(csvCell).join(","));
        });
        const blob = new Blob([lines.join("\n")], { type: "text/csv;charset=utf-8;" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = tableState.filename + "_table.csv";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(link.href);
      }

      function renderTablePage() {
        const start = tableState.page * tableState.pageSize;
        const end = start + tableState.pageSize;
        const pageRows = tableState.rows.slice(start, end);
        const thead = "<thead><tr>" + tableState.headers.map((header) => "<th>" + header + "</th>").join("") + "</tr></thead>";
        const tbody = "<tbody>" + pageRows.map((row) => "<tr>" + row.map((value) => "<td>" + value + "</td>").join("") + "</tr>").join("") + "</tbody>";
        table.innerHTML = tableState.headers.length ? "<table>" + thead + tbody + "</table>" : "";

        const totalPages = Math.max(Math.ceil(tableState.rows.length / tableState.pageSize), 1);
        tablePage.textContent = "Page " + (tableState.page + 1) + " / " + totalPages;
        tablePrev.disabled = tableState.page === 0;
        tableNext.disabled = tableState.page >= totalPages - 1;
        tableExport.disabled = tableState.rows.length === 0;
        tableNote.textContent = tableState.rows.length
          ? "Showing rows " + (start + 1) + "-" + Math.min(end, tableState.rows.length) + " of " + tableState.rows.length + "."
          : "No table data available.";
      }

      function setTableData(headers, rows, filename) {
        tableState.headers = headers;
        tableState.rows = rows;
        tableState.page = 0;
        tableState.filename = filename;
        renderTablePage();
      }

      function renderSimulation(data) {
        const preferred = ["equity", "ir", "bankruptcies", "liquidity", "deposits"];
        const metrics = preferred.filter((metric) => data.series[metric]);
        if (metrics.length === 0) {
          metrics.push(...Object.keys(data.series).slice(0, 5));
        }

        const traces = metrics.map((metric) => ({
          x: data.time,
          y: data.series[metric],
          mode: "lines",
          name: metric
        }));
        Plotly.newPlot(chart, traces, {
          title: "Simulation Time Series",
          margin: { t: 35, r: 20, b: 45, l: 55 },
          xaxis: { title: "t" },
          yaxis: { title: "value" },
          legend: { orientation: "h" }
        }, { responsive: true, displaylogo: false });

        const headers = ["t"].concat(metrics);
        const rows = data.time.map((timeValue, index) => {
          const row = [timeValue];
          metrics.forEach((metric) => {
            row.push(data.series[metric][index]);
          });
          return row;
        });
        setTableData(headers, rows, "simulate");
      }

      tablePrev.addEventListener("click", function () {
        if (tableState.page > 0) {
          tableState.page -= 1;
          renderTablePage();
        }
      });

      tableNext.addEventListener("click", function () {
        const totalPages = Math.max(Math.ceil(tableState.rows.length / tableState.pageSize), 1);
        if (tableState.page < totalPages - 1) {
          tableState.page += 1;
          renderTablePage();
        }
      });

      tableExport.addEventListener("click", exportTableCsv);

      runButton.addEventListener("click", async function () {
        const payload = {
          N: Number(document.getElementById("N").value),
          T: Number(document.getElementById("T").value),
          seed: Number(document.getElementById("seed").value),
          p: Number(document.getElementById("p").value)
        };

        runButton.disabled = true;
        status.textContent = "Running...";
        output.textContent = "{}";

        try {
          const response = await fetch("/api/simulate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.error || "Simulation failed");
          }
          status.textContent = "OK";
          renderSimulation(data);
          output.textContent = JSON.stringify(data, null, 2);
        } catch (error) {
          status.textContent = "Error: " + error.message;
        } finally {
          runButton.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
